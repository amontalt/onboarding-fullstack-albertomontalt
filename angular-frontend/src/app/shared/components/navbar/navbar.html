<nav *ngIf="store.isLoggedIn()" class="bg-primary dark:bg-slate-800 dark:border-b dark:border-slate-700 text-white shadow-md transition-colors duration-300">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="flex h-16 items-center justify-between">
      
      <div class="flex items-center gap-6">
        <span class="text-lg font-bold tracking-tight">MisTareas</span>
        
        <div class="hidden md:flex gap-2 ml-4">
          <a routerLink="/tasks" routerLinkActive="bg-primary-700 dark:bg-slate-700" class="rounded-md px-3 py-2 text-sm font-medium hover:bg-primary-600 dark:hover:bg-slate-600 transition-colors">
            Lista de Tareas
          </a>
          <a *ngIf="store.isAdmin()" routerLink="/admin" routerLinkActive="bg-primary-700 dark:bg-slate-700" class="rounded-md px-3 py-2 text-sm font-medium hover:bg-primary-600 dark:hover:bg-slate-600 transition-colors">
            Panel Admin
          </a>
        </div>
      </div>

      <div class="flex items-center gap-4">
        
        <button 
          (click)="toggleTheme()" 
          class="rounded-full p-2 text-white hover:bg-white/20 focus:outline-none focus:ring-2 focus:ring-white/50 transition-colors"
          aria-label="Alternar tema claro/oscuro">
          
          <svg *ngIf="isDarkMode" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
          </svg>

          <svg *ngIf="!isDarkMode" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
          </svg>
          
        </button>

        <span class="hidden text-sm font-medium opacity-90 sm:block">
          {{ store.user()?.email }}
        </span>
        <button 
          (click)="logout()" 
          class="inline-flex items-center justify-center rounded-md bg-white/10 dark:bg-white/5 px-4 py-2 text-sm font-medium text-white transition-colors hover:bg-white/20 dark:hover:bg-white/10 focus:outline-none focus:ring-2 focus:ring-white/50"
          aria-label="Cerrar sesión">
          Cerrar sesión
        </button>
      </div>

    </div>
  </div>
</nav>
